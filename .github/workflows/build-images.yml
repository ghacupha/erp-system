name: Build Docker Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-system:
    name: Build ERP System image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '18'
          cache: maven

      - name: Build and push backend image to GHCR
        working-directory: erp-system
        env:
          NODE_VERSION: 14.17.6
          SPRING_OUTPUT_ANSI_ENABLED: DETECT
          SPRING_JPA_SHOW_SQL: false
          JHI_DISABLE_WEBPACK_LOGS: true
          NG_CLI_ANALYTICS: false
          ERP_SYSTEM_PROD_DB: "${{ secrets.ERP_SYSTEM_PROD_DB }}"
          SPRING_DATA_JEST_URI: "${{ secrets.SPRING_DATA_JEST_URI }}"
          ERP_SYSTEM_DEV_DB: "${{ secrets.ERP_SYSTEM_DEV_DB }}"
          ERP_SYSTEM_PORT: "${{ secrets.ERP_SYSTEM_PORT }}"
          PG_DATABASE_DEV_USER: "${{ secrets.PG_DATABASE_DEV_USER }}"
          PG_DATABASE_PROD_USER: "${{ secrets.PG_DATABASE_PROD_USER }}"
          PG_DATABASE_DEV_PASSWORD: "${{ secrets.PG_DATABASE_DEV_PASSWORD }}"
          PG_DATABASE_PROD_PASSWORD: "${{ secrets.PG_DATABASE_PROD_PASSWORD }}"
          LOCAL_PG_SERVER: "${{ secrets.LOCAL_PG_SERVER }}"
          ERP_SYSTEM_DEV_PORT: "${{ secrets.ERP_SYSTEM_DEV_PORT }}"
          ERP_SYSTEM_PROD_PORT: "${{ secrets.ERP_SYSTEM_PROD_PORT }}"
          ERP_SYSTEM_PROD_MAIL_BASE_URL: "${{ secrets.ERP_SYSTEM_PROD_MAIL_BASE_URL }}"
          ERP_SYSTEM_DEV_MAIL_BASE_URL: "${{ secrets.ERP_SYSTEM_DEV_MAIL_BASE_URL }}"
          SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: "${{ secrets.SECURITY_AUTHENTICATION_JWT_BASE64_SECRET }}"
          JIB_TO_IMAGE: ghcr.io/${{ github.repository_owner }}/erp-system:${{ github.sha }}
          JIB_TO_AUTH_USERNAME: ${{ github.actor }}
          JIB_TO_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -ntp package -DskipTests jib:dockerBuild -Pprod -Djib.to.image=${JIB_TO_IMAGE} -Djib.to.auth.username=${JIB_TO_AUTH_USERNAME} -Djib.to.auth.password=${JIB_TO_AUTH_PASSWORD}

  build-client:
    name: Build ERP Client image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./erp-client
          file: ./erp-client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/erp-client:${{ github.sha }}
