<div class="row justify-content-center">
  <div class="col-8">
    <div *ngIf="transactionAccountLedger">
      <h2 data-cy="transactionAccountLedgerDetailsHeading"><span>Transaction Account Ledger</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ transactionAccountLedger.id }}</span>
        </dd>
        <dt><span>Ledger Code</span></dt>
        <dd>
          <span>{{ transactionAccountLedger.ledgerCode }}</span>
        </dd>
        <dt><span>Ledger Name</span></dt>
        <dd>
          <span>{{ transactionAccountLedger.ledgerName }}</span>
        </dd>
        <dt><span>Placeholder</span></dt>
        <dd>
          <span *ngFor="let placeholder of transactionAccountLedger.placeholders; let last = last">
            <a [routerLink]="['/placeholder', placeholder?.id, 'view']">{{ placeholder.description }}</a
            >{{ last ? '' : ', ' }}
          </span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/transaction-account-ledger', transactionAccountLedger.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
