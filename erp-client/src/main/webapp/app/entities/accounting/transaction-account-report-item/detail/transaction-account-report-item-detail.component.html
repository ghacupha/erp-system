<div class="row justify-content-center">
  <div class="col-8">
    <div *ngIf="transactionAccountReportItem">
      <h2 data-cy="transactionAccountReportItemDetailsHeading"><span>Transaction Account Report Item</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ transactionAccountReportItem.id }}</span>
        </dd>
        <dt><span>Account Name</span></dt>
        <dd>
          <span>{{ transactionAccountReportItem.accountName }}</span>
        </dd>
        <dt><span>Account Number</span></dt>
        <dd>
          <span>{{ transactionAccountReportItem.accountNumber }}</span>
        </dd>
        <dt><span>Account Balance</span></dt>
        <dd>
          <span>{{ transactionAccountReportItem.accountBalance }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>
    </div>
  </div>
</div>
