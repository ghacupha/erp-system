<div class="row justify-content-center">
  <div class="col-8">
    <div *ngIf="reportingEntity">
      <h2 data-cy="reportingEntityDetailsHeading"><span>Reporting Entity</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span>ID</span></dt>
        <dd>
          <span>{{ reportingEntity.id }}</span>
        </dd>
        <dt><span>Entity Name</span></dt>
        <dd>
          <span>{{ reportingEntity.entityName }}</span>
        </dd>
        <dt><span>Reporting Currency</span></dt>
        <dd>
          <div *ngIf="reportingEntity.reportingCurrency">
            <a [routerLink]="['/settlement-currency', reportingEntity.reportingCurrency?.id, 'view']">{{
              reportingEntity.reportingCurrency?.iso4217CurrencyCode
            }}</a>
          </div>
        </dd>
        <dt><span>Retained Earnings Account</span></dt>
        <dd>
          <div *ngIf="reportingEntity.retainedEarningsAccount">
            <a [routerLink]="['/transaction-account', reportingEntity.retainedEarningsAccount?.id, 'view']">{{
              reportingEntity.retainedEarningsAccount?.accountName
            }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
      </button>

      <button type="button" [routerLink]="['/reporting-entity', reportingEntity.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
      </button>
    </div>
  </div>
</div>
